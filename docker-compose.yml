services:
  postgres:
    image: postgres:16-alpine
    container_name: skillhub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: skillhub
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - skillhub-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d skillhub"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: skillhub-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - skillhub-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  skillhub-postgres-data:
  skillhub-redis-data:
